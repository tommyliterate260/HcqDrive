name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch or tag) to build from'
        required: false
        default: 'main'

permissions:
  contents: write

jobs:
  build-debug:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Locate debug APK
        id: locate-debug
        run: |
          APK=$(find app/build/outputs/apk/debug -name '*.apk' | head -n1)
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"

      - name: Upload debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ${{ steps.locate-debug.outputs.apk_path }}
          if-no-files-found: error

  build-release:
    name: Build signed release APK
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-alpha') && !contains(github.ref_name, '-beta') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode keystore from base64
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          set -e
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::KEYSTORE_BASE64 secret is not set. Skipping signed build."
            exit 0
          fi
          mkdir -p app
          echo "$KEYSTORE_BASE64" | base64 -d > app/release.keystore
          chmod 600 app/release.keystore

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build signed release APK
        env:
          RELEASE_STORE_FILE: app/release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -e
          if [ ! -f "$RELEASE_STORE_FILE" ]; then
            echo "Keystore not present, skipping signed build."
            exit 0
          fi
          ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Locate release APK
        id: locate-release
        if: hashFiles('app/build/outputs/apk/release/*.apk') != ''
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -n1)
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"
          echo "Built signed: $APK"

      - name: Upload signed release artifact
        if: hashFiles('app/build/outputs/apk/release/*.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed
          path: ${{ steps.locate-release.outputs.apk_path }}
          if-no-files-found: warn

      - name: Clean up keystore
        if: always()
        run: rm -f app/release.keystore

  release:
    name: Attach to Release
    needs: [build-debug, build-release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download debug artifact
        uses: actions/download-artifact@v4
        with:
          name: app-debug
          path: dist

      - name: Download signed release artifact (if present)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: app-release-signed
          path: dist

      - name: List artifacts
        run: ls -la dist/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
          body: |
            ## HcqDrive ${{ github.ref_name }}

            Auto-built from commit ${{ github.sha }}.

            ${{ hashFiles('dist/app-release-signed-*.apk') != '' && '**Signed release APK** is attached below, ready to install and (eventually) ship to Play Store.' || 'Only a debug APK is attached. To get a signed release APK, follow the steps in [tools/setup-keystore.sh](tools/setup-keystore.sh) to upload keystore secrets to this repo.' }}

            ### Install

            1. Download an APK below
            2. On your Android phone, enable "Install unknown apps" for your file manager
            3. Tap the APK to install
            4. Open the app → tap **Start Service** → grant permissions → note the 6-digit code
            5. On any device on the same Wi-Fi, open the URL shown and enter the code

            Requires Android 7.0+ (API 24).
