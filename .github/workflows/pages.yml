name: Deploy web demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build web demo
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web (demo mode)
        working-directory: web
        run: npm run build
        env:
          VITE_DEMO: '1'

      - name: Patch index.html to load demo bootstrap
        working-directory: web/dist
        run: |
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path('index.html')
          html = p.read_text()
          if 'demo-bootstrap.js' in html:
              print('demo-bootstrap already injected, skipping')
          else:
              html = html.replace(
                  '</head>',
                  '  <script src="./demo-bootstrap.js" defer></script>\n  </head>'
              )
              p.write_text(html)
              print('Injected demo-bootstrap.js')
          PY

      - name: Verify demo assets
        working-directory: web/dist
        run: |
          ls -la
          test -f demo-sw.js
          test -f demo-bootstrap.js
          echo "Demo assets present."

      - name: Copy 404.html for SPA routing
        working-directory: web/dist
        run: |
          cp index.html 404.html
          echo "404.html created for SPA routing."

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
